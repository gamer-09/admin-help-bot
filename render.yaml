services:
  - type: web
    name: admin-help-bot
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    gracefulShutdownTimeoutInSeconds: 0
    healthCheckPath: /health
    disk:
      name: bot-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_GUILD_ID
        sync: false
      - key: DISCORD_WELCOME_CHANNEL
        value: welcome
      - key: DATA_DIR
        value: /data
    autoDeploy: true
